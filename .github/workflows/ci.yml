name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cargo cache
      uses: Swatinem/rust-cache@v2

    - name: Format check
      run: cargo fmt --all -- --check

    - name: Clippy
      run: cargo clippy --workspace --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cargo cache
      uses: Swatinem/rust-cache@v2

    - name: Build
      run: cargo build --workspace --locked --verbose

    - name: Test
      run: cargo test --workspace --locked --verbose

  docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cargo cache
      uses: Swatinem/rust-cache@v2

    - name: Rustdoc
      env:
        RUSTDOCFLAGS: -D warnings
      run: cargo doc --workspace --no-deps --locked

  dependency-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Cargo deny
      uses: EmbarkStudios/cargo-deny-action@v2
      with:
        command: check advisories bans sources

  release-smoke:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cargo cache
      uses: Swatinem/rust-cache@v2

    - name: Build release
      run: cargo build --workspace --release --locked

    - name: Package analysis crate
      run: |
        cargo package -p mdx-rust-analysis --locked

    - name: Install CLI from path
      run: |
        install_root="$(mktemp -d)"
        cargo install --path crates/mdx-rust --root "$install_root" --locked --debug
        "$install_root/bin/mdx-rust" --version
