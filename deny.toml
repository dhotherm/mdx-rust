[graph]
targets = [
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "x86_64-apple-darwin" },
  { triple = "aarch64-apple-darwin" },
]

[advisories]
version = 2
yanked = "deny"
# Advisory ignores must be rare and temporary. Every entry must include:
# - review date
# - affected dependency path
# - reason this project is not affected or why the risk is accepted
# - exact condition for removal
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
# Do not add duplicate-version skips casually. If a skip becomes necessary,
# include the dependency path, impact, and removal condition in the PR.

[sources]
unknown-registry = "deny"
unknown-git = "deny"
